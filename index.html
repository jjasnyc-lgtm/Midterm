<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harlem Plaza Midterm</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Harlem Plaza Redesign</h1>
  </header>

  <main>
    <div class="container">
      <!-- Left Column -->
      <div class="left-column">
        <div class="nature-overlay">
          <h2>Project Context</h2>
          <p>This column highlights the site context and natural features.</p>
        </div>
      </div>

      <!-- Right Column -->
      <div class="right-column">
        <section id="before-after">
          <h2>Before & After</h2>
          <div class="photos">
            <div class="before-photo">
              <img src="images/before-design.jpg" alt="Before Design">
              <p>Before</p>
            </div>
            <div class="after-photo">
              <img src="images/after-design.jpg" alt="After Design">
              <p>After</p>
            </div>
          </div>
        </section>

        <section id="other-designs">
          <h2>Other Design Concepts</h2>
          <div id="design-gallery">
            <!-- JS will populate this automatically -->
          </div>
        </section>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Harlem Plaza Project</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
